<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0d1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Uschi Consulting">
<meta name="description" content="Das Orakel – Uschi Consulting">
<title>Uschi Consulting</title>
<link rel="manifest" href="#" id="manifest-link">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0d0d1a;
  --bg2: #12121f;
  --pink: #ff2d78;
  --cyan: #00f0ff;
  --purple: #bf5fff;
  --gold: #ffd700;
  --text: #f0e6ff;
  --text-dim: rgba(240,230,255,0.5);
  --darkviolet: #4a0080;
  --midpurple: #7b2fff;
  --lightpink: #ff6ec7;
  --lightcyan: #00c9ff;

  --cat-1: #00f0ff;
  --cat-2: #bf5fff;
  --cat-3: #9b30e8;
  --cat-4: #ff2d78;
  --cat-5: #7b2fff;
  --cat-6: #ff6ec7;
  --cat-7: #00c9ff;
  --cat-8: #ffd700;
  --cat-9: var(--pink);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  overflow: hidden;
  overscroll-behavior: none;
}

/* GRAIN OVERLAY */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.4;
}

/* SCREENS */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease;
  overflow-y: auto;
  overflow-x: hidden;
}
.screen.active {
  opacity: 1;
  pointer-events: all;
}

/* DARK MODE TOGGLE */
#dark-toggle {
  position: fixed;
  top: 1.2rem;
  right: 1.2rem;
  z-index: 999;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50%;
  width: 2.4rem;
  height: 2.4rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1rem;
  transition: all 0.3s;
}
#dark-toggle:hover { background: rgba(255,255,255,0.1); }

body.light-mode {
  --bg: #f5f0ff;
  --bg2: #ede6ff;
  --text: #1a0a2e;
  --text-dim: rgba(26,10,46,0.5);
}

/* BACK BUTTON */
.back-btn {
  position: fixed;
  top: 1.2rem;
  left: 1.2rem;
  z-index: 999;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50%;
  width: 2.4rem;
  height: 2.4rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1rem;
  transition: all 0.3s;
  opacity: 0;
  pointer-events: none;
}
.back-btn.visible { opacity: 1; pointer-events: all; }
.back-btn:hover { background: rgba(255,255,255,0.1); }

/* ===== START SCREEN ===== */
#screen-start {
  gap: 3rem;
}

.logo-area {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.8rem;
}

.logo-title {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: clamp(1.1rem, 5vw, 1.6rem);
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  background: linear-gradient(135deg, var(--pink), var(--cyan), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.logo-sub {
  font-size: 0.75rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-dim);
  font-weight: 300;
}

.start-symbol {
  width: 160px;
  height: 110px;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.start-choices {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  width: 100%;
  max-width: 320px;
}

.choice-btn {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 4px;
  padding: 1.2rem 1.6rem;
  color: var(--text);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 0.9rem;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all 0.3s;
  text-align: left;
  position: relative;
  overflow: hidden;
}

.choice-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent, rgba(255,255,255,0.03));
  opacity: 0;
  transition: opacity 0.3s;
}

.choice-btn:hover::before, .choice-btn:active::before { opacity: 1; }

.choice-btn .choice-label {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 0.3rem;
}

.choice-btn .choice-desc {
  font-size: 0.8rem;
  color: var(--text-dim);
  font-weight: 300;
  line-height: 1.4;
}

.choice-btn.yes-no { border-color: var(--pink); }
.choice-btn.yes-no .choice-label { color: var(--pink); }
.choice-btn.oracle { border-color: var(--cyan); }
.choice-btn.oracle .choice-label { color: var(--cyan); }

.choice-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}
.choice-btn.yes-no:hover { box-shadow: 0 8px 30px rgba(255,45,120,0.2); }
.choice-btn.oracle:hover { box-shadow: 0 8px 30px rgba(0,240,255,0.2); }

/* FAV BUTTON on start */
.fav-entry {
  font-size: 0.75rem;
  color: var(--text-dim);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text-dim);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  transition: color 0.3s;
}
.fav-entry:hover { color: var(--gold); }

/* ===== YES/NO SCREEN ===== */
#screen-yesno {
  gap: 2.5rem;
}

.screen-title {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-dim);
  text-align: center;
}

.yesno-instruction {
  text-align: center;
  max-width: 280px;
  line-height: 1.7;
  color: var(--text-dim);
  font-size: 1rem;
  font-weight: 400;
  font-style: italic;
  font-family: 'EB Garamond', Georgia, serif;
}

.pulse-btn {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  border: 2px solid var(--pink);
  background: rgba(255,45,120,0.05);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: all 0.3s;
  animation: pulse-ring 3s ease-in-out infinite;
}

.pulse-btn::before, .pulse-btn::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  border: 1px solid var(--pink);
  animation: pulse-expand 3s ease-out infinite;
}
.pulse-btn::before { inset: -15px; opacity: 0.4; }
.pulse-btn::after { inset: -30px; opacity: 0.2; animation-delay: 0.5s; }

@keyframes pulse-ring {
  0%, 100% { box-shadow: 0 0 20px rgba(255,45,120,0.2); }
  50% { box-shadow: 0 0 40px rgba(255,45,120,0.4); }
}

@keyframes pulse-expand {
  0% { transform: scale(1); opacity: 0.4; }
  100% { transform: scale(1.3); opacity: 0; }
}

.pulse-btn:active {
  transform: scale(0.95);
  background: rgba(255,45,120,0.15);
}

.pulse-btn-inner {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--pink);
}

/* ===== CATEGORIES SCREEN ===== */
#screen-categories {
  justify-content: flex-start;
  padding-top: 5rem;
  gap: 1.5rem;
}

.cat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.8rem;
  width: 100%;
  max-width: 380px;
}

.cat-card {
  aspect-ratio: 1;
  border-radius: 4px;
  border: 1px solid;
  background: rgba(255,255,255,0.02);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  cursor: pointer;
  padding: 0.6rem;
  position: relative;
  overflow: hidden;
  transition: transform 0.3s, box-shadow 0.3s;
}

.cat-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, currentColor, transparent 70%);
  opacity: 0.05;
  animation: breathe 4s ease-in-out infinite;
  animation-delay: var(--delay, 0s);
}

@keyframes breathe {
  0%, 100% { opacity: 0.03; transform: scale(0.8); }
  50% { opacity: 0.08; transform: scale(1.1); }
}

.cat-card:hover {
  transform: translateY(-3px);
}
.cat-card:active { transform: scale(0.97); }

.cat-card span {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  line-height: 1.3;
  position: relative;
  z-index: 1;
  color: rgba(240,230,255,0.92);
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
}

/* ===== ANSWER SCREEN ===== */
#screen-answer {
  gap: 2rem;
}

.answer-symbol-wrap {
  width: 160px;
  height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.8s ease, filter 0.8s ease;
}
.answer-symbol-wrap svg {
  width: 140px;
  height: 140px;
  display: block;
}
.answer-symbol-wrap.revealed {
  opacity: 1;
  animation: glow-symbol 2s ease-in-out infinite alternate;
}

@keyframes glow-symbol {
  from { filter: drop-shadow(0 0 8px rgba(191,95,255,0.4)); }
  to { filter: drop-shadow(0 0 20px rgba(0,240,255,0.5)); }
}

.answer-text {
  max-width: 320px;
  text-align: center;
  line-height: 1.85;
  font-size: 1.15rem;
  font-weight: 400;
  font-family: 'EB Garamond', Georgia, serif;
  color: var(--text);
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.8s ease 0.4s, transform 0.8s ease 0.4s;
}
.answer-text.revealed {
  opacity: 1;
  transform: translateY(0);
}

.answer-category {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-dim);
  opacity: 0;
  transition: opacity 0.8s ease 0.8s;
}
.answer-category.revealed { opacity: 1; }

.answer-actions {
  display: flex;
  gap: 1.5rem;
  opacity: 0;
  transition: opacity 0.8s ease 1s;
}
.answer-actions.revealed { opacity: 1; }

.action-btn {
  background: none;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 3px;
  padding: 0.6rem 1.2rem;
  color: var(--text-dim);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.3s;
}
.action-btn:hover { border-color: var(--gold); color: var(--gold); }
.action-btn.fav-active { border-color: var(--gold); color: var(--gold); }

/* FLASH ANIMATION */
@keyframes flash-reveal {
  0% { opacity: 0; }
  30% { opacity: 1; filter: brightness(2); }
  60% { opacity: 1; filter: brightness(1.3); }
  100% { opacity: 1; filter: brightness(1); }
}

.flash { animation: flash-reveal 0.6s ease forwards; }

/* ===== FAVORITES SCREEN ===== */
#screen-favorites {
  justify-content: flex-start;
  padding-top: 5rem;
  gap: 1rem;
}

.fav-list {
  width: 100%;
  max-width: 380px;
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
  overflow-y: auto;
  max-height: calc(100vh - 8rem);
  padding-bottom: 2rem;
}

.fav-item {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 4px;
  padding: 1rem 1.2rem;
  position: relative;
}

.fav-item-text {
  font-size: 1rem;
  line-height: 1.7;
  font-weight: 400;
  font-family: 'EB Garamond', Georgia, serif;
  color: var(--text);
}

.fav-item-meta {
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  margin-top: 0.5rem;
}

.fav-remove {
  position: absolute;
  top: 0.8rem;
  right: 0.8rem;
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 0.8rem;
  transition: color 0.3s;
}
.fav-remove:hover { color: var(--pink); }

.empty-state {
  text-align: center;
  color: var(--text-dim);
  font-size: 0.85rem;
  font-weight: 300;
  font-style: italic;
  margin-top: 3rem;
}

/* YESNO ANSWER special */
.yesno-verdict {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  opacity: 0;
  transition: opacity 0.5s ease;
}
.yesno-verdict.revealed { opacity: 1; }
.yesno-verdict.ja { color: var(--cyan); }
.yesno-verdict.nein { color: var(--pink); }


/* EYE BLINK */
@keyframes blink {
  0%, 45%, 55%, 100% { d: path("M10 40 Q60 5 110 40 Q60 75 10 40Z"); }
  50% { d: path("M10 40 Q60 36 110 40 Q60 44 10 40Z"); }
}
@keyframes blink-outline {
  0%, 45%, 55%, 100% { d: path("M10 40 Q60 5 110 40 Q60 75 10 40Z"); }
  50% { d: path("M10 40 Q60 36 110 40 Q60 44 10 40Z"); }
}
@keyframes iris-hide {
  0%, 40%, 60%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
#eye-outline { animation: blink-outline 6s ease-in-out infinite; }
#eye-iris { animation: iris-hide 6s ease-in-out infinite; }
#eye-pupil { animation: iris-hide 6s ease-in-out infinite; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
</style>
</head>
<body>

<button id="dark-toggle" title="Dark/Light Mode">☽</button>
<button class="back-btn" id="back-btn">←</button>

<!-- SCREEN: START -->
<div class="screen active" id="screen-start">
  <div class="logo-area">
    <svg class="start-symbol" id="eye-svg" viewBox="0 0 120 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="eyeGrad" x1="0" y1="0" x2="120" y2="80">
          <stop offset="0%" stop-color="#ff2d78"/>
          <stop offset="50%" stop-color="#bf5fff"/>
          <stop offset="100%" stop-color="#00f0ff"/>
        </linearGradient>
        <clipPath id="eyeClip">
          <path id="eye-shape" d="M10 40 Q60 5 110 40 Q60 75 10 40Z"/>
        </clipPath>
      </defs>
      <!-- outer glow lines -->
      <path d="M5 40 Q60 0 115 40 Q60 80 5 40Z" stroke="url(#eyeGrad)" stroke-width="0.5" fill="none" opacity="0.3"/>
      <!-- main eye outline -->
      <path id="eye-outline" d="M10 40 Q60 5 110 40 Q60 75 10 40Z" stroke="url(#eyeGrad)" stroke-width="1.5" fill="none"/>
      <!-- iris -->
      <circle id="eye-iris" cx="60" cy="40" r="18" stroke="url(#eyeGrad)" stroke-width="1.2" fill="none"/>
      <!-- iris detail rings -->
      <circle cx="60" cy="40" r="13" stroke="url(#eyeGrad)" stroke-width="0.5" fill="none" opacity="0.5"/>
      <circle cx="60" cy="40" r="8" stroke="url(#eyeGrad)" stroke-width="0.5" fill="none" opacity="0.4"/>
      <!-- pupil -->
      <circle id="eye-pupil" cx="60" cy="40" r="7" fill="url(#eyeGrad)" opacity="0.9"/>
      <!-- pupil highlight -->
      <circle cx="63" cy="37" r="2" fill="rgba(255,255,255,0.4)"/>
      <!-- lash lines top -->
      <line x1="60" y1="5" x2="60" y2="0" stroke="url(#eyeGrad)" stroke-width="1" opacity="0.5"/>
      <line x1="40" y1="10" x2="37" y2="5" stroke="url(#eyeGrad)" stroke-width="1" opacity="0.4"/>
      <line x1="80" y1="10" x2="83" y2="5" stroke="url(#eyeGrad)" stroke-width="1" opacity="0.4"/>
      <!-- lash lines bottom -->
      <line x1="60" y1="75" x2="60" y2="80" stroke="url(#eyeGrad)" stroke-width="1" opacity="0.3"/>
    </svg>
    <div class="logo-title">Uschi Consulting</div>
    <div class="logo-sub">Das Orakel</div>
  </div>

  <div class="start-choices">
    <button class="choice-btn yes-no" onclick="goTo('yesno')">
      <div class="choice-label">Ja oder Nein</div>
      <div class="choice-desc">Halte deine Frage im Kopf. Uschi antwortet.</div>
    </button>
    <button class="choice-btn oracle" onclick="goTo('categories')">
      <div class="choice-label">Orakelspruch</div>
      <div class="choice-desc">Wähle ein Thema. Lass dich führen.</div>
    </button>
  </div>

  <button class="fav-entry" onclick="goTo('favorites')">✦ Favoriten</button>
</div>

<!-- SCREEN: YES/NO -->
<div class="screen" id="screen-yesno">
  <div class="screen-title">Ja oder Nein</div>
  <div class="yesno-instruction">Formuliere deine Frage klar.<br>Halte sie in Gedanken.<br>Wenn sie klar ist – tippe.</div>
  <button class="pulse-btn" onclick="answerYesNo()" id="pulse-btn">
    <span class="pulse-btn-inner">Tippe</span>
  </button>
</div>

<!-- SCREEN: CATEGORIES -->
<div class="screen" id="screen-categories">
  <div class="screen-title">Wähle dein Thema</div>
  <div class="cat-grid" id="cat-grid"></div>
</div>

<!-- SCREEN: ANSWER -->
<div class="screen" id="screen-answer">
  <div class="answer-category" id="answer-category"></div>
  <div class="yesno-verdict" id="yesno-verdict"></div>
  <div class="answer-symbol-wrap" id="answer-symbol"></div>
  <div class="answer-text" id="answer-text"></div>
  <div class="answer-actions">
    <button class="action-btn" id="fav-btn" onclick="toggleFavorite()">♡ Merken</button>
    <button class="action-btn" onclick="goBack()">← Zurück</button>
  </div>
</div>

<!-- SCREEN: FAVORITES -->
<div class="screen" id="screen-favorites">
  <div class="screen-title">Favoriten</div>
  <div class="fav-list" id="fav-list"></div>
</div>

<script>
// ============================================================
// DATA
// ============================================================

const SENTENCES = [
  // Kraft tanken (1)
  { text: "Du bist hier. Das reicht erstmal. Nicht alles muss jetzt gelöst, verstanden oder entschieden werden. Dieser Moment ist genug.", cat: [0, 9] },

  { text: "Kümmere dich um dein Nervensystem. Wenn du unter Druck stehst, ist deine Wahrnehmung verzerrt. Komm erst runter – dann schau was wirklich stimmt.", cat: [0, 3] },

  { text: "Was nährt dich wirklich? Nicht was ablenkt, betäubt oder kurzfristig funktioniert. Was gibt dir echte Energie zurück?", cat: [0, 4] },

  { text: "Was brauchst du gerade wirklich? Nicht was du solltest, nicht was andere erwarten. Was brauchst du – jetzt, heute, in diesem Moment?", cat: [0, 4] },
  { text: "Es ist okay langsam zu sein. Tiefe braucht Zeit. Nicht alles was schnell geht, geht weit.", cat: [0, 9] },

      return `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="currentColor" stroke-width="1"/>`;
    }).join('')}
  </svg>`,

  // 49: Nóatún / Nordic protection
  `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="40" stroke="currentColor" stroke-width="1.5"/>
    ${[0,1,2,3,4,5,6,7].map(i => {
      const a = (i*45-90)*Math.PI/180;
      const x = 50+40*Math.cos(a), y = 50+40*Math.sin(a);
      return `<line x1="50" y1="50" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="currentColor" stroke-width="1.5"/>`;
    }).join('')}
    <circle cx="50" cy="50" r="15" stroke="currentColor" stroke-width="1.5"/>
    <circle cx="50" cy="50" r="4" fill="currentColor"/>
  </svg>`,
];

// ============================================================
// STATE
// ============================================================
let currentScreen = 'start';
let currentAnswer = null;
let favorites = JSON.parse(localStorage.getItem('uschi-favs') || '[]');
let lightMode = localStorage.getItem('uschi-light') === 'true';

if (lightMode) document.body.classList.add('light-mode');

// ============================================================
// NAVIGATION
// ============================================================
function goTo(screen) {
  document.getElementById('screen-' + currentScreen).classList.remove('active');
  document.getElementById('screen-' + screen).classList.add('active');
  currentScreen = screen;

  const backBtn = document.getElementById('back-btn');
  if (screen === 'start') {
    backBtn.classList.remove('visible');
  } else {
    backBtn.classList.add('visible');
  }

  if (screen === 'favorites') renderFavorites();
}

function goBack() {
  if (currentScreen === 'answer') {
    goTo('start');
  } else {
    goTo('start');
  }
}

document.getElementById('back-btn').onclick = goBack;

// ============================================================
// DARK MODE
// ============================================================
document.getElementById('dark-toggle').onclick = () => {
  lightMode = !lightMode;
  document.body.classList.toggle('light-mode', lightMode);
  localStorage.setItem('uschi-light', lightMode);
  document.getElementById('dark-toggle').textContent = lightMode ? '☀' : '☽';
};

// ============================================================
// CATEGORIES
// ============================================================
const grid = document.getElementById('cat-grid');
CATEGORIES.forEach((cat, i) => {
  const card = document.createElement('div');
  card.className = 'cat-card';
  card.style.borderColor = cat.color;
  card.style.color = cat.color;
  card.style.setProperty('--delay', cat.delay);
  card.innerHTML = `<span>${cat.name}</span>`;
  card.onclick = () => showAnswer(i);
  grid.appendChild(card);
});

// ============================================================
// SHOW ANSWER
// ============================================================
function getRandomSymbol() {
  return Math.floor(Math.random() * SYMBOLS.length);
}

function showAnswer(catIndex) {
  const isRandom = catIndex === 8;
  let pool;
  if (isRandom) {
    pool = SENTENCES;
  } else {
    pool = SENTENCES.filter(s => s.cat.includes(catIndex));
    if (pool.length === 0) pool = SENTENCES;
  }

  const sentence = pool[Math.floor(Math.random() * pool.length)];
  const symbolIndex = getRandomSymbol();
  const color = isRandom
    ? ['var(--pink)','var(--cyan)','var(--purple)','var(--gold)'][Math.floor(Math.random()*4)]
    : CATEGORIES[catIndex].color;

  currentAnswer = {
    text: sentence.text,
    cat: isRandom ? 'Zufall' : CATEGORIES[catIndex].name,
    symbolIndex,
    color,
    type: 'oracle'
  };

  renderAnswerScreen(false);
  goTo('answer');
  revealAnswer();
}

function answerYesNo() {
  const yn = YESNO[Math.floor(Math.random() * YESNO.length)];
  const symbolIndex = getRandomSymbol();
  const color = yn.verdict === 'Ja' ? 'var(--cyan)' : 'var(--pink)';

  currentAnswer = {
    text: yn.text,
    verdict: yn.verdict,
    cat: 'Ja / Nein',
    symbolIndex,
    color,
    type: 'yesno'
  };

  renderAnswerScreen(true);
  goTo('answer');
  revealAnswer();
}

function renderAnswerScreen(isYesNo) {
  const symWrap = document.getElementById('answer-symbol');
  const ansText = document.getElementById('answer-text');
  const ansCat = document.getElementById('answer-category');
  const verdict = document.getElementById('yesno-verdict');
  const favBtn = document.getElementById('fav-btn');
  const actions = document.querySelector('.answer-actions');

  // Reset
  symWrap.classList.remove('revealed');
  ansText.classList.remove('revealed');
  ansCat.classList.remove('revealed');
  actions.classList.remove('revealed');
  verdict.classList.remove('revealed', 'ja', 'nein');

  symWrap.style.color = currentAnswer.color;
  symWrap.innerHTML = SYMBOLS[currentAnswer.symbolIndex];
  ansText.textContent = currentAnswer.text;
  ansCat.textContent = currentAnswer.cat;

  if (isYesNo) {
    verdict.textContent = currentAnswer.verdict;
    verdict.classList.add(currentAnswer.verdict === 'Ja' ? 'ja' : 'nein');
    verdict.style.display = 'block';
  } else {
    verdict.style.display = 'none';
  }

  // Favorite state
  const isFav = favorites.some(f => f.text === currentAnswer.text);
  favBtn.textContent = isFav ? '♥ Gemerkt' : '♡ Merken';
  favBtn.classList.toggle('fav-active', isFav);
}

function revealAnswer() {
  setTimeout(() => {
    document.getElementById('answer-symbol').classList.add('revealed', 'flash');
  }, 100);
  setTimeout(() => {
    document.getElementById('answer-text').classList.add('revealed');
  }, 400);
  setTimeout(() => {
    document.getElementById('answer-category').classList.add('revealed');
  }, 700);
  setTimeout(() => {
    if (currentAnswer.type === 'yesno') document.getElementById('yesno-verdict').classList.add('revealed');
    document.querySelector('.answer-actions').classList.add('revealed');
  }, 900);
}

// ============================================================
// FAVORITES
// ============================================================
function toggleFavorite() {
  const favBtn = document.getElementById('fav-btn');
  const idx = favorites.findIndex(f => f.text === currentAnswer.text);
  if (idx > -1) {
    favorites.splice(idx, 1);
    favBtn.textContent = '♡ Merken';
    favBtn.classList.remove('fav-active');
  } else {
    favorites.push({ text: currentAnswer.text, cat: currentAnswer.cat, date: new Date().toLocaleDateString('de-AT') });
    favBtn.textContent = '♥ Gemerkt';
    favBtn.classList.add('fav-active');
  }
  localStorage.setItem('uschi-favs', JSON.stringify(favorites));
}

function renderFavorites() {
  const list = document.getElementById('fav-list');
  if (favorites.length === 0) {
    list.innerHTML = '<div class="empty-state">Noch keine Favoriten gespeichert.</div>';
    return;
  }
  list.innerHTML = favorites.map((f, i) => `
    <div class="fav-item">
      <div class="fav-item-text">${f.text}</div>
      <div class="fav-item-meta">${f.cat} · ${f.date}</div>
      <button class="fav-remove" onclick="removeFav(${i})">✕</button>
    </div>
  `).join('');
}

function removeFav(i) {
  favorites.splice(i, 1);
  localStorage.setItem('uschi-favs', JSON.stringify(favorites));
  renderFavorites();
}
